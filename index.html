<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Investor Wisdom">
<title>Investor Wisdom</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Jost', sans-serif;
  background: #000;
  user-select: none;
}

/* Background gradient that changes per quote */
#bg {
  position: fixed;
  inset: 0;
  background-size: cover;
  background-position: center;
  transition: background 1.2s ease;
  z-index: 0;
}

/* Dark overlay for readability */
#overlay {
  position: fixed;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.25) 0%,
    rgba(0,0,0,0.45) 40%,
    rgba(0,0,0,0.65) 80%,
    rgba(0,0,0,0.8) 100%
  );
  z-index: 1;
}

/* Main content */
#app {
  position: fixed;
  inset: 0;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: env(safe-area-inset-top, 48px) 32px env(safe-area-inset-bottom, 40px);
}

/* Top bar */
.top-bar {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 8px;
}
.app-name {
  font-family: 'Jost', sans-serif;
  font-size: 13px;
  font-weight: 300;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.7);
}
.date-pill {
  font-size: 11px;
  font-weight: 300;
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0.6);
  background: rgba(255,255,255,0.12);
  border: 0.5px solid rgba(255,255,255,0.2);
  border-radius: 999px;
  padding: 4px 12px;
}

/* Quote area — center of screen */
.quote-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 0 8px;
  max-width: 520px;
  width: 100%;
}

.quote-mark {
  font-family: 'Cormorant Garamond', serif;
  font-size: 72px;
  line-height: 0.5;
  color: rgba(255,255,255,0.35);
  margin-bottom: 16px;
  display: block;
}

#quote-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(22px, 5.5vw, 32px);
  font-weight: 300;
  font-style: italic;
  line-height: 1.55;
  color: #ffffff;
  text-shadow: 0 2px 20px rgba(0,0,0,0.4);
  transition: opacity 0.4s ease, transform 0.4s ease;
}

/* Bottom section */
.bottom-section {
  width: 100%;
  max-width: 520px;
}

.investor-block {
  text-align: center;
  margin-bottom: 28px;
  transition: opacity 0.4s ease;
}
.investor-name {
  font-size: 14px;
  font-weight: 400;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.95);
  margin-bottom: 4px;
}
.investor-desc {
  font-size: 12px;
  font-weight: 300;
  letter-spacing: 0.06em;
  color: rgba(255,255,255,0.55);
}
.india-flag {
  font-size: 14px;
  margin-right: 6px;
}

/* Navigation dots */
.nav-dots {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 20px;
}
.dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
  transition: all 0.3s;
  cursor: pointer;
}
.dot.active {
  width: 20px;
  border-radius: 3px;
  background: rgba(255,255,255,0.9);
}

/* Prev / Next nav */
.nav-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.nav-btn {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
  border: 0.5px solid rgba(255,255,255,0.25);
  color: rgba(255,255,255,0.9);
  font-size: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
  flex-shrink: 0;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}
.nav-btn:active { transform: scale(0.93); background: rgba(255,255,255,0.2); }

.today-btn {
  flex: 1;
  height: 52px;
  border-radius: 999px;
  background: rgba(255,255,255,0.12);
  border: 0.5px solid rgba(255,255,255,0.25);
  color: rgba(255,255,255,0.9);
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-family: 'Jost', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}
.today-btn:active { transform: scale(0.97); background: rgba(255,255,255,0.22); }

/* Filter chips row */
.filter-row {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-bottom: 16px;
  flex-wrap: nowrap;
}
.chip {
  font-size: 11px;
  font-weight: 300;
  letter-spacing: 0.08em;
  padding: 6px 14px;
  border-radius: 999px;
  border: 0.5px solid rgba(255,255,255,0.25);
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.65);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  font-family: 'Jost', sans-serif;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}
.chip.active {
  background: rgba(255,255,255,0.22);
  border-color: rgba(255,255,255,0.6);
  color: #fff;
}

/* Fade transition class */
.fading {
  opacity: 0 !important;
  transform: translateY(10px) !important;
}

/* Swipe hint */
.swipe-hint {
  position: fixed;
  bottom: 50%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 12px;
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0.4);
  z-index: 3;
  pointer-events: none;
  transition: opacity 1s;
}

/* Day counter badge */
.day-counter {
  position: fixed;
  top: env(safe-area-inset-top, 48px);
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  pointer-events: none;
}
</style>
</head>
<body>

<div id="bg"></div>
<div id="overlay"></div>

<div id="app">

  <!-- Top bar -->
  <div class="top-bar">
    <div class="app-name">Investor Wisdom</div>
    <div class="date-pill" id="date-pill">—</div>
  </div>

  <!-- Quote -->
  <div class="quote-area">
    <span class="quote-mark">"</span>
    <div id="quote-text">Loading today's wisdom...</div>
  </div>

  <!-- Bottom -->
  <div class="bottom-section">

    <div class="investor-block" id="investor-block">
      <div class="investor-name" id="investor-name">—</div>
      <div class="investor-desc" id="investor-desc">—</div>
    </div>

    <div class="filter-row">
      <div class="chip active" data-filter="all">All investors</div>
      <div class="chip" data-filter="india">🇮🇳 Indian</div>
      <div class="chip" data-filter="global">🌐 Global</div>
    </div>

    <div class="nav-dots" id="nav-dots">
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <div class="nav-row">
      <button class="nav-btn" id="btn-prev">&#8592;</button>
      <button class="today-btn" id="btn-today">Today</button>
      <button class="nav-btn" id="btn-next">&#8594;</button>
    </div>

  </div>
</div>

<script>
const quotes = [
  {q:"The stock market is a device for transferring money from the impatient to the patient.",i:"Warren Buffett",d:"Chairman, Berkshire Hathaway",o:"global",bg:"linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%)"},
  {q:"Risk comes from not knowing what you're doing.",i:"Warren Buffett",d:"Chairman, Berkshire Hathaway",o:"global",bg:"linear-gradient(135deg,#0d0d0d 0%,#1a0a00 50%,#2d1500 100%)"},
  {q:"Price is what you pay. Value is what you get.",i:"Warren Buffett",d:"Chairman, Berkshire Hathaway",o:"global",bg:"linear-gradient(135deg,#0a0a1a 0%,#0d1f3c 50%,#1a3a6e 100%)"},
  {q:"Be fearful when others are greedy and greedy when others are fearful.",i:"Warren Buffett",d:"Chairman, Berkshire Hathaway",o:"global",bg:"linear-gradient(135deg,#1a0a0a 0%,#2d1010 50%,#1a0505 100%)"},
  {q:"Our favorite holding period is forever.",i:"Warren Buffett",d:"Chairman, Berkshire Hathaway",o:"global",bg:"linear-gradient(135deg,#0a1a0a 0%,#0d2d0d 50%,#061a06 100%)"},
  {q:"In the short run, the market is a voting machine; in the long run, it is a weighing machine.",i:"Benjamin Graham",d:"Father of value investing",o:"global",bg:"linear-gradient(135deg,#1a1200 0%,#2d2000 50%,#1a1200 100%)"},
  {q:"The intelligent investor is a realist who sells to optimists and buys from pessimists.",i:"Benjamin Graham",d:"Father of value investing",o:"global",bg:"linear-gradient(135deg,#0d0020 0%,#1a0040 50%,#0d0020 100%)"},
  {q:"To achieve satisfactory investment results is easier than most people realize; to achieve superior results is harder than it looks.",i:"Benjamin Graham",d:"Father of value investing",o:"global",bg:"linear-gradient(135deg,#00101a 0%,#002030 50%,#003040 100%)"},
  {q:"An investment operation is one which, upon thorough analysis, promises safety of principal and an adequate return.",i:"Benjamin Graham",d:"Father of value investing",o:"global",bg:"linear-gradient(135deg,#101010 0%,#1a1a2a 50%,#101020 100%)"},
  {q:"The market is there only as a reference point to see if anybody is offering to do something foolish.",i:"Charlie Munger",d:"Vice Chairman, Berkshire Hathaway",o:"global",bg:"linear-gradient(135deg,#0a0a0a 0%,#1a1010 50%,#2a1515 100%)"},
  {q:"All I want to know is where I'm going to die, so I'll never go there.",i:"Charlie Munger",d:"Vice Chairman, Berkshire Hathaway",o:"global",bg:"linear-gradient(135deg,#0f0f20 0%,#1a1a35 50%,#252545 100%)"},
  {q:"Invert, always invert.",i:"Charlie Munger",d:"Vice Chairman, Berkshire Hathaway",o:"global",bg:"linear-gradient(135deg,#1a0f00 0%,#2d1a00 50%,#1a0f00 100%)"},
  {q:"The best thing a human being can do is to help another human being know more.",i:"Charlie Munger",d:"Vice Chairman, Berkshire Hathaway",o:"global",bg:"linear-gradient(135deg,#001a10 0%,#002d1a 50%,#001a10 100%)"},
  {q:"It's not supposed to be easy. Anyone who finds it easy is stupid.",i:"Charlie Munger",d:"Vice Chairman, Berkshire Hathaway",o:"global",bg:"linear-gradient(135deg,#1a1a00 0%,#2d2d00 50%,#1a1a00 100%)"},
  {q:"Know what you own and know why you own it.",i:"Peter Lynch",d:"Manager, Fidelity Magellan Fund",o:"global",bg:"linear-gradient(135deg,#001020 0%,#002040 50%,#003060 100%)"},
  {q:"The real key to making money in stocks is not to get scared out of them.",i:"Peter Lynch",d:"Manager, Fidelity Magellan Fund",o:"global",bg:"linear-gradient(135deg,#100010 0%,#200030 50%,#100020 100%)"},
  {q:"Behind every stock is a company. Find out what it's doing.",i:"Peter Lynch",d:"Manager, Fidelity Magellan Fund",o:"global",bg:"linear-gradient(135deg,#0a1a10 0%,#102a1a 50%,#0a1a10 100%)"},
  {q:"Never invest in any idea you can't illustrate with a crayon.",i:"Peter Lynch",d:"Manager, Fidelity Magellan Fund",o:"global",bg:"linear-gradient(135deg,#1a1000 0%,#2a1800 50%,#1a1000 100%)"},
  {q:"The four most dangerous words in investing are: 'this time it's different'.",i:"John Templeton",d:"Pioneer of global investing",o:"global",bg:"linear-gradient(135deg,#1a0005 0%,#2d0010 50%,#1a0005 100%)"},
  {q:"Bull markets are born on pessimism, grow on skepticism, mature on optimism and die on euphoria.",i:"John Templeton",d:"Pioneer of global investing",o:"global",bg:"linear-gradient(135deg,#000f1a 0%,#001a2d 50%,#002040 100%)"},
  {q:"The time of maximum pessimism is the best time to buy.",i:"John Templeton",d:"Pioneer of global investing",o:"global",bg:"linear-gradient(135deg,#100a00 0%,#1a1000 50%,#2a1a00 100%)"},
  {q:"It is impossible to produce superior performance unless you do something different from the majority.",i:"John Templeton",d:"Pioneer of global investing",o:"global",bg:"linear-gradient(135deg,#0a001a 0%,#10002d 50%,#0a0020 100%)"},
  {q:"The biggest risk of all is not taking one.",i:"Mellody Hobson",d:"Co-CEO, Ariel Investments",o:"global",bg:"linear-gradient(135deg,#001a1a 0%,#002d2d 50%,#001a1a 100%)"},
  {q:"I made my money by selling too soon.",i:"Bernard Baruch",d:"American financier",o:"global",bg:"linear-gradient(135deg,#0f0f0f 0%,#1a1a1a 50%,#252525 100%)"},
  {q:"Markets are never wrong — opinions often are.",i:"Jesse Livermore",d:"Wall Street speculator",o:"global",bg:"linear-gradient(135deg,#1a0a00 0%,#2d1500 50%,#3d2000 100%)"},
  {q:"The trend is your friend until the end when it bends.",i:"Ed Seykota",d:"Commodities trader",o:"global",bg:"linear-gradient(135deg,#001a0a 0%,#002d10 50%,#003d1a 100%)"},
  {q:"Cut your losses and let your winners run.",i:"Ed Seykota",d:"Commodities trader",o:"global",bg:"linear-gradient(135deg,#1a0000 0%,#2d0000 50%,#1a0000 100%)"},
  {q:"Win or lose, everybody gets what they want out of the market.",i:"Ed Seykota",d:"Commodities trader",o:"global",bg:"linear-gradient(135deg,#000a1a 0%,#00102d 50%,#001a3d 100%)"},
  {q:"Diversification is protection against ignorance. It makes little sense if you know what you are doing.",i:"Warren Buffett",d:"Chairman, Berkshire Hathaway",o:"global",bg:"linear-gradient(135deg,#0a0a1a 0%,#10102d 50%,#1a1a3d 100%)"},
  {q:"The stock market is filled with individuals who know the price of everything, but the value of nothing.",i:"Philip Fisher",d:"Author, Common Stocks and Uncommon Profits",o:"global",bg:"linear-gradient(135deg,#1a1000 0%,#2d1a00 50%,#1a1000 100%)"},
  {q:"Successful investing is about managing risk, not avoiding it.",i:"Benjamin Graham",d:"Father of value investing",o:"global",bg:"linear-gradient(135deg,#001010 0%,#002020 50%,#003030 100%)"},
  {q:"The most important quality for an investor is temperament, not intellect.",i:"Warren Buffett",d:"Chairman, Berkshire Hathaway",o:"global",bg:"linear-gradient(135deg,#100010 0%,#1a001a 50%,#250025 100%)"},
  {q:"An investment in knowledge pays the best interest.",i:"Benjamin Franklin",d:"Founding Father & investor",o:"global",bg:"linear-gradient(135deg,#0a1000 0%,#101a00 50%,#1a2500 100%)"},
  {q:"Compound interest is the eighth wonder of the world.",i:"Albert Einstein",d:"Physicist & thinker",o:"global",bg:"linear-gradient(135deg,#00101a 0%,#001a2d 50%,#002040 100%)"},
  {q:"The best investment you can make is in yourself.",i:"Warren Buffett",d:"Chairman, Berkshire Hathaway",o:"global",bg:"linear-gradient(135deg,#1a0a0a 0%,#2d1010 50%,#1a0a0a 100%)"},
  {q:"If you aren't willing to own a stock for ten years, don't even think about owning it for ten minutes.",i:"Warren Buffett",d:"Chairman, Berkshire Hathaway",o:"global",bg:"linear-gradient(135deg,#001a05 0%,#002d10 50%,#001a05 100%)"},
  {q:"Time in the market beats timing the market.",i:"Ken Fisher",d:"Founder, Fisher Investments",o:"global",bg:"linear-gradient(135deg,#10000a 0%,#1a001a 50%,#25002d 100%)"},
  {q:"Don't look for the needle in the haystack. Just buy the haystack.",i:"Jack Bogle",d:"Founder, Vanguard Group",o:"global",bg:"linear-gradient(135deg,#0a0a00 0%,#1a1a00 50%,#2a2a00 100%)"},
  {q:"In investing, what is comfortable is rarely profitable.",i:"Robert Arnott",d:"Founder, Research Affiliates",o:"global",bg:"linear-gradient(135deg,#1a001a 0%,#2d002d 50%,#1a001a 100%)"},
  {q:"Markets can remain irrational longer than you can remain solvent.",i:"John Maynard Keynes",d:"Economist",o:"global",bg:"linear-gradient(135deg,#001a1a 0%,#002d2d 50%,#003d3d 100%)"},
  {q:"It's not whether you're right or wrong, but how much money you make when you're right.",i:"George Soros",d:"Founder, Quantum Fund",o:"global",bg:"linear-gradient(135deg,#0a0010 0%,#100020 50%,#1a0035 100%)"},
  {q:"If investing is entertaining, if you're having fun, you're probably not making any money.",i:"George Soros",d:"Founder, Quantum Fund",o:"global",bg:"linear-gradient(135deg,#101000 0%,#1a1a00 50%,#252500 100%)"},
  {q:"The way to make money is to buy when blood is running in the streets.",i:"John D. Rockefeller",d:"Standard Oil founder",o:"global",bg:"linear-gradient(135deg,#1a0000 0%,#2d0000 50%,#3d0505 100%)"},
  {q:"Opportunities come infrequently. When it rains gold, put out the bucket, not the thimble.",i:"Warren Buffett",d:"Chairman, Berkshire Hathaway",o:"global",bg:"linear-gradient(135deg,#001020 0%,#002035 50%,#00304d 100%)"},
  {q:"Someone's sitting in the shade today because someone planted a tree a long time ago.",i:"Warren Buffett",d:"Chairman, Berkshire Hathaway",o:"global",bg:"linear-gradient(135deg,#001500 0%,#002500 50%,#003500 100%)"},
  {q:"It's far better to buy a wonderful company at a fair price than a fair company at a wonderful price.",i:"Warren Buffett",d:"Chairman, Berkshire Hathaway",o:"global",bg:"linear-gradient(135deg,#0a0020 0%,#10003d 50%,#1a0050 100%)"},
  {q:"You don't need to be a rocket scientist. Investing is not a game where the guy with the 160 IQ beats the guy with 130 IQ.",i:"Warren Buffett",d:"Chairman, Berkshire Hathaway",o:"global",bg:"linear-gradient(135deg,#1a1000 0%,#2d1a05 50%,#1a1000 100%)"},
  {q:"The most contrarian thing of all is not to oppose the crowd but to think for yourself.",i:"Peter Thiel",d:"Co-founder, PayPal",o:"global",bg:"linear-gradient(135deg,#00001a 0%,#00002d 50%,#000040 100%)"},
  {q:"You have to be willing to hold a position for months or years and watch it go down significantly before it goes up.",i:"Seth Klarman",d:"Founder, Baupost Group",o:"global",bg:"linear-gradient(135deg,#100500 0%,#1a0a00 50%,#251000 100%)"},
  {q:"The biggest mistake investors make is to believe that what happened in the recent past is likely to persist.",i:"Ray Dalio",d:"Founder, Bridgewater Associates",o:"global",bg:"linear-gradient(135deg,#001010 0%,#002020 50%,#00302d 100%)"},
  {q:"Pain plus reflection equals progress.",i:"Ray Dalio",d:"Founder, Bridgewater Associates",o:"global",bg:"linear-gradient(135deg,#1a0a00 0%,#2d1500 50%,#1a0a00 100%)"},
  {q:"Embrace reality and deal with it.",i:"Ray Dalio",d:"Founder, Bridgewater Associates",o:"global",bg:"linear-gradient(135deg,#000a1a 0%,#00102d 50%,#001540 100%)"},
  {q:"Think for yourself while being radically open-minded.",i:"Ray Dalio",d:"Founder, Bridgewater Associates",o:"global",bg:"linear-gradient(135deg,#0a001a 0%,#10002d 50%,#1a0040 100%)"},
  {q:"Markets have never been driven by logic alone.",i:"Howard Marks",d:"Co-founder, Oaktree Capital",o:"global",bg:"linear-gradient(135deg,#101010 0%,#1a1a10 50%,#252515 100%)"},
  {q:"You can't predict. You can prepare.",i:"Howard Marks",d:"Co-founder, Oaktree Capital",o:"global",bg:"linear-gradient(135deg,#001a10 0%,#002d1a 50%,#003d25 100%)"},
  {q:"Being too far ahead of your time is indistinguishable from being wrong.",i:"Howard Marks",d:"Co-founder, Oaktree Capital",o:"global",bg:"linear-gradient(135deg,#1a1a00 0%,#2d2d05 50%,#1a1a00 100%)"},
  {q:"Good times teach only bad lessons — that investing is easy, that you know its secrets, and that you needn't worry about risk.",i:"Howard Marks",d:"Co-founder, Oaktree Capital",o:"global",bg:"linear-gradient(135deg,#1a000a 0%,#2d0010 50%,#1a000a 100%)"},
  {q:"In investing, you get what you don't pay for.",i:"Jack Bogle",d:"Founder, Vanguard Group",o:"global",bg:"linear-gradient(135deg,#00101a 0%,#00152d 50%,#001a40 100%)"},
  {q:"Stay the course. No matter what happens, stick to your program.",i:"Jack Bogle",d:"Founder, Vanguard Group",o:"global",bg:"linear-gradient(135deg,#0a0a00 0%,#151500 50%,#202000 100%)"},
  {q:"Time is your friend; impulse is your enemy.",i:"Jack Bogle",d:"Founder, Vanguard Group",o:"global",bg:"linear-gradient(135deg,#001a00 0%,#002d00 50%,#003d00 100%)"},
  {q:"Rule No. 1: Never lose money. Rule No. 2: Never forget Rule No. 1.",i:"Warren Buffett",d:"Chairman, Berkshire Hathaway",o:"global",bg:"linear-gradient(135deg,#1a0000 0%,#2d0000 50%,#3d0000 100%)"},
  {q:"If you don't find a way to make money while you sleep, you will work until you die.",i:"Warren Buffett",d:"Chairman, Berkshire Hathaway",o:"global",bg:"linear-gradient(135deg,#00001a 0%,#00002d 50%,#000040 100%)"},
  {q:"The philosophy of the rich: invest money first, spend what is left.",i:"Robert Kiyosaki",d:"Author, Rich Dad Poor Dad",o:"global",bg:"linear-gradient(135deg,#0a1000 0%,#152000 50%,#1a2d00 100%)"},
  {q:"Financial freedom is available to those who learn about it and work for it.",i:"Robert Kiyosaki",d:"Author, Rich Dad Poor Dad",o:"global",bg:"linear-gradient(135deg,#100a00 0%,#1a1000 50%,#251500 100%)"},
  {q:"The best time to plant a tree was 20 years ago. The second best time is now.",i:"Chinese Proverb",d:"Timeless wisdom",o:"global",bg:"linear-gradient(135deg,#001010 0%,#002020 50%,#003030 100%)"},
  {q:"A penny saved is a penny earned.",i:"Benjamin Franklin",d:"Founding Father & investor",o:"global",bg:"linear-gradient(135deg,#10100a 0%,#1a1a10 50%,#25251a 100%)"},
  {q:"The way to wealth is plain as the way to market. It depends chiefly on industry and frugality.",i:"Benjamin Franklin",d:"Founding Father & investor",o:"global",bg:"linear-gradient(135deg,#0a0a1a 0%,#101025 50%,#1a1a30 100%)"},
  {q:"The most powerful force in the universe is compound interest.",i:"Albert Einstein",d:"Physicist & thinker",o:"global",bg:"linear-gradient(135deg,#001a1a 0%,#002525 50%,#003535 100%)"},
  {q:"Spend each day trying to be a little wiser than you were when you woke up.",i:"Charlie Munger",d:"Vice Chairman, Berkshire Hathaway",o:"global",bg:"linear-gradient(135deg,#0a001a 0%,#150025 50%,#200030 100%)"},

function getDayOfYear(date) {
  const start = new Date(date.getFullYear(), 0, 0);
  return Math.floor((date - start) / 86400000);
}
function getDaysInYear(y) {
  return ((y%4===0&&y%100!==0)||y%400===0) ? 366 : 365;
}

let offset = 0;
let filter = 'all';
let isAnimating = false;

function getFiltered() {
  if (filter === 'india') return quotes.filter(q => q.o === 'india');
  if (filter === 'global') return quotes.filter(q => q.o === 'global');
  return quotes;
}

function render(dir) {
  if (isAnimating) return;
  isAnimating = true;

  const target = new Date();
  target.setDate(target.getDate() + offset);
  const day = getDayOfYear(target);
  const filtered = getFiltered();
  const idx = (day - 1) % filtered.length;
  const entry = filtered[idx];

  const qt = document.getElementById('quote-text');
  const ib = document.getElementById('investor-block');

  qt.classList.add('fading');
  ib.classList.add('fading');

  setTimeout(() => {
    // Update background
    document.getElementById('bg').style.background = entry.bg;

    // Update content
    qt.textContent = entry.q;
    document.getElementById('investor-name').textContent =
      (entry.o === 'india' ? '🇮🇳 ' : '') + entry.i;
    document.getElementById('investor-desc').textContent = entry.d;

    // Update date pill
    const dateStr = target.toLocaleDateString('en-IN', {
      day: 'numeric', month: 'short', year: 'numeric'
    });
    document.getElementById('date-pill').textContent = dateStr;

    // Update dots (show position mod 5)
    const dots = document.querySelectorAll('.dot');
    const dotPos = ((idx % 5) + 5) % 5;
    dots.forEach((d, i) => d.classList.toggle('active', i === dotPos));

    qt.classList.remove('fading');
    ib.classList.remove('fading');

    setTimeout(() => { isAnimating = false; }, 400);
  }, 350);
}

// Navigation
document.getElementById('btn-prev').addEventListener('click', () => { offset--; render('left'); });
document.getElementById('btn-next').addEventListener('click', () => { offset++; render('right'); });
document.getElementById('btn-today').addEventListener('click', () => { offset = 0; render('none'); });

// Filter chips
document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    filter = chip.dataset.filter;
    render('none');
  });
});

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') { offset--; render('left'); }
  if (e.key === 'ArrowRight') { offset++; render('right'); }
  if (e.key === 't' || e.key === 'T') { offset = 0; render('none'); }
});

// Touch swipe
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, {passive:true});
document.addEventListener('touchend', e => {
  const diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 60) {
    if (diff > 0) { offset++; render('left'); }
    else { offset--; render('right'); }
  }
}, {passive:true});

// Initial render
render('none');
</script>
